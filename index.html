<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AVA | Availability & Reservations</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- LOGIN -->

<section id="loginScreen" class="login-screen hidden">

    <div class="login-card">

        <div class="brand">

    <div class="logo-badge">
        A
    </div>

    <h1>AVA</h1>

    <p>Availability & Reservations</p>

</div>

        <form id="loginForm">

            <div class="form-group">

                <label>Name</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter your name"
                    required
                >

            </div>

            <div class="form-group">

                <label>PIN</label>

                <input
                    type="password"
                    id="pin"
                    placeholder="Enter PIN"
                    required
                >

            </div>

            <button type="submit" class="btn-primary">

                Sign In

            </button>

        </form>

    </div>

</section>

<!-- APP -->

<div id="appShell" class="app-shell">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <h2>AVA</h2>

            <span>
                Hospitality Operations
            </span>

        </div>

        <nav class="sidebar-nav">

    <button class="nav-item active">
        🏠 Dashboard
    </button>

    <button class="nav-item">
        📅 Calendar
    </button>

    <button class="nav-item">
        🔍 Availability
    </button>

    <button class="nav-item">
        🛏 Reservations
    </button>

    <button class="nav-item">
        🏡 Properties
    </button>

    <button class="nav-item">
        👥 Agents
    </button>

    <button class="nav-item">
        ⚙ Settings
    </button>

</nav>
        <div class="sidebar-footer">

            <div id="currentUser">

                Agent

            </div>

        </div>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <header class="topbar">

            <div class="topbar-left">

                <h2>
                    Dashboard
                </h2>

            </div>

            <div class="topbar-right">

                <select id="propertyFilter">

                    <option>
                        Good Earth Homestay
                    </option>

                    <option>
                        Camp Alpha
                    </option>

                </select>

            </div>

        </header>

        <!-- DASHBOARD -->

        <section class="dashboard-grid">

            <div class="stat-card">

                <h3>Available Rooms</h3>

                <h1 id="availableRooms">
                    0
                </h1>

            </div>

            <div class="stat-card">

                <h3>Active Holds</h3>

                <h1 id="activeHolds">
                    0
                </h1>

            </div>

            <div class="stat-card">

                <h3>Confirmed</h3>

                <h1 id="confirmedBookings">
                    0
                </h1>

            </div>

            <div class="stat-card">

                <h3>Occupancy</h3>

                <h1 id="occupancy">
                    0%
                </h1>

            </div>

        </section>

        <!-- CALENDAR TOOLBAR -->

        <section class="calendar-toolbar">

            <div class="toolbar-left">

                <input
                    type="date"
                    id="checkIn"
                >

                <input
                    type="date"
                    id="checkOut"
                >

                <select id="roomTypeFilter">

                    <option value="">
                        All Room Types
                    </option>

                </select>

                <button id="searchAvailability" class="btn-primary">

                    Search Availability

                </button>

            </div>

        </section>

        <!-- CALENDAR -->

        <section class="calendar-container">

            <div id="calendarBoard">

                <!-- Generated by JS -->

            </div>

        </section>

    </main>

</div>

<!-- RESERVATION DRAWER -->

<aside id="reservationDrawer" class="reservation-drawer">

    <div class="drawer-header">

        <h2>
            Reservation
        </h2>

    </div>

    <div class="drawer-body">

        <div class="form-group">

            <label>
                Guest Name
            </label>

            <input
                type="text"
                id="guestName"
            >

        </div>

        <div class="form-group">

            <label>
                Phone
            </label>

            <input
                type="text"
                id="guestPhone"
            >

        </div>

        <div class="form-group">

            <label>
                Status
            </label>

            <select id="bookingStatus">

                <option>HOLD</option>

                <option>CONFIRMED</option>

                <option>CHECKED_IN</option>

                <option>CHECKED_OUT</option>

            </select>

        </div>

        <button class="btn-primary">

            Save Reservation

        </button>

    </div>

</aside>

<script src="api.js"></script>
<script src="calendar.js"></script>
<script src="app.js"></script>

</body>
</html>
